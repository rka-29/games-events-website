<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خمّن الرقم السري</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Style.css">
  <link rel="stylesheet" href="../Teams.css">

</head>

<body class="game-page">

<div class="back-bar">
  <button class="back-btn" onclick="location.href='../index.html'">🏠 الرئيسية</button>

  <div class="score-pills">
    <span class="score-pill red-pill" id="scorePill1">الفريق الأول: 0</span>
    <span class="score-pill blue-pill" id="scorePill2">الفريق الثاني: 0</span>
  </div>
</div>

<section class="game-panel" id="secretSection">
  <div class="panel-inner">

    <div class="panel-head">
      <div class="panel-icon-wrap">🔢</div>

      <div class="panel-head-text">
        <h3 class="panel-title">خمّن الرقم السري</h3>
        <p class="panel-sub">القائد يدخل الرقم · الفريقين يخمنون</p>
      </div>
    </div>

    <div id="snSetup">
      <div class="sg-setup">
        <p class="sg-setup-label">القائد يكتب الرقم السري</p>
        <p class="sg-setup-hint">٤ أرقام · لا يشوفه أحد غيرك</p>

        <div class="sg-slots" id="snSetupSlots">
          <div class="sg-slot sg-active">_</div>
          <div class="sg-slot">_</div>
          <div class="sg-slot">_</div>
          <div class="sg-slot">_</div>
        </div>

        <div class="sg-numpad">
          <button class="sg-key" onclick="snKey(1)">1</button>
          <button class="sg-key" onclick="snKey(2)">2</button>
          <button class="sg-key" onclick="snKey(3)">3</button>

          <button class="sg-key" onclick="snKey(4)">4</button>
          <button class="sg-key" onclick="snKey(5)">5</button>
          <button class="sg-key" onclick="snKey(6)">6</button>

          <button class="sg-key" onclick="snKey(7)">7</button>
          <button class="sg-key" onclick="snKey(8)">8</button>
          <button class="sg-key" onclick="snKey(9)">9</button>

          <button class="sg-key sg-key-del" onclick="snDel()">←</button>
          <button class="sg-key" onclick="snKey(0)">0</button>
          <button class="sg-key sg-key-confirm" onclick="snConfirm()">✓</button>
        </div>

        <p class="sg-err" id="snSetupErr"></p>
      </div>
    </div>

    <div id="snPlay" style="display:none">
      <div class="sg-play">

        <div class="sg-log" id="snLog"></div>

        <div class="sg-guess-area">
          <p class="sg-guess-label">المحاولة <span id="snAttempt">1</span> من 7</p>

          <div class="sg-slots" id="snGuessSlots">
            <div class="sg-slot sg-active">_</div>
            <div class="sg-slot">_</div>
            <div class="sg-slot">_</div>
            <div class="sg-slot">_</div>
          </div>

          <div class="sg-numpad">
            <button class="sg-key" onclick="snGuessKey(1)">1</button>
            <button class="sg-key" onclick="snGuessKey(2)">2</button>
            <button class="sg-key" onclick="snGuessKey(3)">3</button>

            <button class="sg-key" onclick="snGuessKey(4)">4</button>
            <button class="sg-key" onclick="snGuessKey(5)">5</button>
            <button class="sg-key" onclick="snGuessKey(6)">6</button>

            <button class="sg-key" onclick="snGuessKey(7)">7</button>
            <button class="sg-key" onclick="snGuessKey(8)">8</button>
            <button class="sg-key" onclick="snGuessKey(9)">9</button>

            <button class="sg-key sg-key-del" onclick="snGuessDel()">←</button>
            <button class="sg-key" onclick="snGuessKey(0)">0</button>
            <button class="sg-key sg-key-confirm" onclick="snGuessSubmit()">✓</button>
          </div>

          <p class="sg-err" id="snGuessErr"></p>
        </div>

        <div id="snResult"></div>

        <div class="sg-bottom-btns">
          <button class="act-btn primary" onclick="snReset()">🔄 لعبة جديدة</button>
          <button class="act-btn ghost" onclick="snReveal()">👁 كشف الرقم</button>

          <button class="act-btn red" id="snScoreBtnRed" onclick="snScore(1)">
            +١ للفريق الأول
          </button>

          <button class="act-btn blue" id="snScoreBtnBlue" onclick="snScore(2)">
            +١ للفريق الثاني
          </button>
        </div>

      </div>
    </div>

  </div>
</section>

<script>
var snSecret = "";
var snGuess = ["", "", "", ""];
var snSlot = 0;
var snAttempts = [];
var snDone = false;

var scores = [0, 0];

/* =========================
   أسماء الفرق والنقاط
   ========================= */

function getStoredTeamNames() {
  try {
    return JSON.parse(localStorage.getItem("eidTeamNames") || '["الفريق الأول","الفريق الثاني"]');
  } catch (e) {
    return ["الفريق الأول", "الفريق الثاني"];
  }
}

function getTeamName(team) {
  var names = getStoredTeamNames();

  if (team === 1 || team === "red") {
    return names[0] || "الفريق الأول";
  }

  if (team === 2 || team === "blue") {
    return names[1] || "الفريق الثاني";
  }

  return "الفريق";
}

function loadData() {
  try {
    var s = localStorage.getItem("eidScores");

    if (s) {
      scores = JSON.parse(s);
    }

    if (!Array.isArray(scores) || scores.length < 2) {
      scores = [0, 0];
    }
  } catch (e) {
    scores = [0, 0];
  }

  updateScoreText();
  updateSecretScoreButtons();
}

function saveScores() {
  localStorage.setItem("eidScores", JSON.stringify(scores));
  updateScoreText();
  updateSecretScoreButtons();
}

function updateScoreText() {
  var scorePill1 = document.getElementById("scorePill1");
  var scorePill2 = document.getElementById("scorePill2");

  if (scorePill1) {
    scorePill1.textContent = getTeamName(1) + ": " + scores[0];
  }

  if (scorePill2) {
    scorePill2.textContent = getTeamName(2) + ": " + scores[1];
  }
}

function updateSecretScoreButtons() {
  var redBtn = document.getElementById("snScoreBtnRed");
  var blueBtn = document.getElementById("snScoreBtnBlue");

  if (redBtn) {
    redBtn.textContent = "+١ لـ " + getTeamName(1);
  }

  if (blueBtn) {
    blueBtn.textContent = "+١ لـ " + getTeamName(2);
  }
}

function snScore(team) {
  scores[team - 1]++;
  saveScores();
}

/* =========================
   لعبة الرقم السري
   ========================= */

function initSecretGame() {
  snSecret = "";
  snGuess = ["", "", "", ""];
  snSlot = 0;
  snAttempts = [];
  snDone = false;

  document.getElementById("snSetup").style.display = "block";
  document.getElementById("snPlay").style.display = "none";
  document.getElementById("snResult").innerHTML = "";
  document.getElementById("snLog").innerHTML = "";
  document.getElementById("snAttempt").textContent = "1";

  snRefreshSetup();
}

function snKey(k) {
  if (snSecret.length >= 4) return;

  snSecret += String(k);
  snRefreshSetup();
}

function snDel() {
  if (snSecret.length > 0) {
    snSecret = snSecret.slice(0, -1);
    snRefreshSetup();
  }
}

function snConfirm() {
  if (snSecret.length < 4) {
    snSetErr("snSetupErr", "أدخل ٤ أرقام!");
    return;
  }

  document.getElementById("snSetup").style.display = "none";
  document.getElementById("snPlay").style.display = "block";

  snGuess = ["", "", "", ""];
  snSlot = 0;

  snRefreshGuess();
}

function snRefreshSetup() {
  var slots = document.querySelectorAll("#snSetupSlots .sg-slot");

  for (var i = 0; i < slots.length; i++) {
    slots[i].textContent = snSecret[i] ? "●" : "_";
    slots[i].className = "sg-slot" + (i === snSecret.length ? " sg-active" : "");
  }
}

function snGuessKey(k) {
  if (snDone || snSlot > 3) return;

  snGuess[snSlot] = String(k);
  snSlot = snSlot < 3 ? snSlot + 1 : 4;

  snRefreshGuess();
}

function snGuessDel() {
  for (var i = 3; i >= 0; i--) {
    if (snGuess[i] !== "") {
      snGuess[i] = "";
      snSlot = i;
      snRefreshGuess();
      return;
    }
  }
}

/*
  هذا هو الإصلاح المهم:
  نحسب الصحيح أولاً، وبعدها نحسب الموجود بمكان غلط فقط من الأرقام المتبقية.
  هذا يمنع احتساب الرقم مرتين إذا كان أصلاً بمكانه الصح.
*/
function snCheckGuess(g) {
  var secret = snSecret.split("");
  var guess = g.split("");

  var secretUsed = [false, false, false, false];
  var guessUsed = [false, false, false, false];

  var correct = 0;
  var mis = 0;
  var marks = ["wrong", "wrong", "wrong", "wrong"];

  for (var i = 0; i < 4; i++) {
    if (guess[i] === secret[i]) {
      correct++;
      secretUsed[i] = true;
      guessUsed[i] = true;
      marks[i] = "correct";
    }
  }

  for (var i = 0; i < 4; i++) {
    if (guessUsed[i]) continue;

    for (var j = 0; j < 4; j++) {
      if (secretUsed[j]) continue;

      if (guess[i] === secret[j]) {
        mis++;
        secretUsed[j] = true;
        guessUsed[i] = true;
        marks[i] = "mis";
        break;
      }
    }
  }

  return {
    correct: correct,
    mis: mis,
    marks: marks
  };
}

function snGuessSubmit() {
  if (snDone) return;

  for (var i = 0; i < 4; i++) {
    if (snGuess[i] === "") {
      snSetErr("snGuessErr", "أكمل الأرقام!");
      return;
    }
  }

  var g = snGuess.join("");
  var result = snCheckGuess(g);

  snAttempts.push({
    g: g,
    correct: result.correct,
    mis: result.mis,
    marks: result.marks
  });

  snGuess = ["", "", "", ""];
  snSlot = 0;

  snRenderLog();
  snRefreshGuess();

  document.getElementById("snAttempt").textContent = snAttempts.length + 1;

  if (result.correct === 4) {
    snDone = true;
    snShowResult("win");
  } else if (snAttempts.length >= 7) {
    snDone = true;
    snShowResult("lose");
  }
}

function snRefreshGuess() {
  var slots = document.querySelectorAll("#snGuessSlots .sg-slot");
  var next = -1;

  for (var i = 0; i < 4; i++) {
    if (snGuess[i] === "") {
      next = i;
      break;
    }
  }

  for (var i = 0; i < slots.length; i++) {
    var filled = snGuess[i] !== "";

    slots[i].textContent = filled ? snGuess[i] : "_";
    slots[i].className =
      "sg-slot" +
      (filled ? " sg-filled" : "") +
      (i === (next === -1 ? 4 : next) ? " sg-active" : "");
  }
}

function snRenderLog() {
  var html = "";

  for (var i = 0; i < snAttempts.length; i++) {
    var a = snAttempts[i];
    var digits = "";

    for (var j = 0; j < 4; j++) {
      var d = a.g[j];
      var mark = a.marks ? a.marks[j] : "wrong";

      var cls =
        mark === "correct"
          ? "sg-d-green"
          : mark === "mis"
          ? "sg-d-yellow"
          : "sg-d-red";

      digits += '<span class="sg-log-digit ' + cls + '">' + d + "</span>";
    }

    html +=
      '<div class="sg-log-row">' +
        '<span class="sg-log-num">' + (i + 1) + "</span>" +
        '<div class="sg-log-digits">' + digits + "</div>" +
        '<div class="sg-log-hints">' +
          '<span class="hint-green">' + a.correct + " ✅</span>" +
          '<span class="hint-yellow">' + a.mis + " 🔄</span>" +
        "</div>" +
      "</div>";
  }

  var log = document.getElementById("snLog");

  log.innerHTML = html;
  log.scrollTop = log.scrollHeight;
}

function snShowResult(type) {
  document.getElementById("snResult").innerHTML =
    type === "win"
      ? '<div class="sg-win">🎉 صح! الرقم كان <strong>' + snSecret + "</strong></div>"
      : '<div class="sg-lose">❌ انتهت المحاولات! الرقم كان <strong>' + snSecret + "</strong></div>";
}

function snReveal() {
  document.getElementById("snResult").innerHTML =
    '<div class="sg-lose">👁 الرقم السري: <strong>' + snSecret + "</strong></div>";

  snDone = true;
}

function snReset() {
  initSecretGame();
}

function snSetErr(id, msg) {
  var el = document.getElementById(id);

  if (!el) return;

  el.textContent = msg;

  setTimeout(function () {
    el.textContent = "";
  }, 1800);
}

window.addEventListener("load", function () {
  loadData();
  initSecretGame();
});
</script>

</body>
</html>
